---
# tasks file for app

#1. git 설치
#2. pip 설치
#3. git clone
#4. app requirement 설치
#5. app service 등록 (template 사용)
#6. app enable 활성화


- name: 1. git 설치
  ansible.builtin.dnf:
    name: git
    state: present

- name: 2. pip 설치
  ansible.builtin.dnf:
    name: python3-pip
    state: present

- name: 3. git clone
  ansible.builtin.git:
    repo: 'https://github.com/hyun159/coin-apt-calculator'
    dest: /opt/coin-apt-calculator

- name: 4. app requirement 설치
  ansible.builtin.pip:
    requirements: /opt/coin-apt-calculator/coin-apt/requirements.txt

- name: 5. app service 등록 (template 사용)
  template:
    dest: /etc/systemd/system/coin-apt.service
    src: coinapp_service.j2
  notify:
    - reloaded
    - restart
   

- name: 6. app enable 활성화
  ansible.builtin.service:
    name: coin-apt.service
    enabled: yes
    state: started